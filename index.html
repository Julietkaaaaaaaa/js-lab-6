<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lights Out — Логічна Гра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <h1>Lights Out</h1>
        
        <div class="stats-panel">
            <div>Кроки: <span id="moves-count">0</span></div>
            <div>Час: <span id="timer-display">00:00</span></div>
        </div>

        <div class="board-container">
            <div id="game-board" class="board"></div>
            
            <div id="win-overlay" class="overlay hidden">
                <div class="win-card">
                    <h2>ПЕРЕМОГА! 🎉</h2>
                    <p id="final-stats"></p>
                    <button onclick="resetGame()">Грати знову</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="resetGame()">Нова гра (Перемішати)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
